name: Daily Digest Agent

on:
  schedule:
    # Morning run — target 07:00 Madrid CEST (UTC+2) = 05:00 UTC
    # Cron fires at 04:30 UTC to absorb GitHub's ~15-30 min scheduling delay
    # + ~15 min agent runtime → posts live by ~07:00-07:15 Madrid
    - cron: '30 4 * * *'
    # Afternoon run — 15:00 Madrid = 13:00 UTC — breaking news only
    - cron: '0 13 * * *'
    # Sunday weekly summary — 10:00 Madrid = 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scrape + write, skip git push)'
        required: false
        default: false
        type: boolean
      stories:
        description: 'Number of stories to publish (default: 6)'
        required: false
        default: '6'
        type: string
      breaking_only:
        description: 'Only publish breaking news (afternoon mode)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-agent:
    name: Run digest agent
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run agent
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:             ${{ secrets.EMAIL_FROM }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN:           ${{ secrets.GH_TOKEN }}
          BLOG_GITHUB_REPO:       ${{ secrets.BLOG_GITHUB_REPO }}
          BLOG_GITHUB_TOKEN:      ${{ secrets.BLOG_GITHUB_TOKEN }}
          BLOG_REPO_PATH:         ${{ github.workspace }}
          BLOG_POSTS_SUBDIR:      blog/src/content/posts
          REDDIT_CLIENT_ID:       ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:   ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:      first-cup/1.0
          DAILY_RUN_HOUR:         '7'
          DAILY_RUN_MINUTE:       '0'
          TIMEZONE:               Europe/Madrid
          STORIES_PER_RUN:        ${{ github.event.inputs.stories || '6' }}
          BREAKING_ONLY:          ${{ github.event.schedule == '0 13 * * *' || github.event.inputs.breaking_only == 'true' }}
          WEEKLY_SUMMARY:         ${{ github.event.schedule == '0 8 * * 0' }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:       ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PREMIUM_GROUP_ID: ${{ secrets.TELEGRAM_PREMIUM_GROUP_ID }}
          LINKEDIN_ACCESS_TOKEN:     ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN:       ${{ secrets.LINKEDIN_AUTHOR_URN }}
        run: python -m agent.main

      - name: Verify new posts
        run: |
          COUNT=$(git status --short | grep "blog/src/content/posts/" | wc -l)
          echo "New posts found: $COUNT"
          git status --short

      - name: Commit and push new posts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "First Cup Bot"
          git config user.email "bot@firstcup.dev"
          git add blog/src/content/posts/
          if git diff --cached --quiet; then
            echo "Nothing to commit — no new posts this run."
          else
            POSTS=$(git diff --cached --name-only | wc -l)
            git commit -m "chore(agent): add ${POSTS} post(s) $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
