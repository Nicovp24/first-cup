<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12091f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />

  <!-- Decorative grid lines -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Glow orb -->
  <circle cx="600" cy="315" r="280" fill="#7c3aed" opacity="0.06" filter="url(#glow)" />

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)" />

  <!-- Hexagon logo icon -->
  <polygon
    points="140,260 180,237 220,260 220,306 180,329 140,306"
    fill="none"
    stroke="#7c3aed"
    stroke-width="2.5"
    opacity="0.9"
  />
  <polygon
    points="152,267 180,251 208,267 208,299 180,315 152,299"
    fill="#7c3aed"
    opacity="0.25"
  />

  <!-- Main title -->
  <text
    x="260"
    y="295"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="800"
    letter-spacing="-2"
    fill="white"
  >NEXUS</text>

  <text
    x="260"
    y="295"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="800"
    letter-spacing="-2"
    fill="white"
  >
    <tspan dx="5" fill="url(#accent-grad)">DIGEST</tspan>
  </text>

  <!-- Subtitle -->
  <text
    x="260"
    y="350"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    fill="#888888"
    letter-spacing="0.5"
  >El digest semanal de tecnología e IA</text>

  <!-- Bottom domain -->
  <text
    x="600"
    y="560"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="18"
    font-weight="500"
    fill="#555555"
    text-anchor="middle"
    letter-spacing="2"
  >nexusdigest.com</text>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent-grad)" opacity="0.4" />
</svg>
