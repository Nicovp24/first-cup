<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F0F11"/>
  <!-- Coffee fill (amber, bottom ~55% of cup) -->
  <path d="M7 22 L25 22 L26.2 13.5 L5.8 13.5 Z" fill="#F59E0B"/>
  <!-- Cup body outline -->
  <path d="M7 22 L25 22 L27.2 8 L4.8 8 Z" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Handle -->
  <path d="M25 12 C30.5 12 30.5 20 25 20" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Rim highlight -->
  <line x1="4" y1="8" x2="28" y2="8" stroke="rgba(250,250,250,0.55)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Steam wisps -->
  <path d="M13 5 C12 3 14 1.5 13 -0.5" stroke="#F59E0B" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
  <path d="M19 4.5 C18 2.5 20 1 19 -1" stroke="#F59E0B" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
</svg>
